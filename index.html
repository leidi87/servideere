<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOTEC-SERVIDEERE</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <style>
        :root { --ion-color-primary: #367c2b; --ion-color-secondary: #ffde00; }
        .logo-box { text-align: center; padding: 20px; background: #f4f4f4; }
        .logo-box img { max-width: 180px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .app-title { font-weight: bold; text-align: center; color: #367c2b; margin-top: 10px; }
        ion-button { margin-top: 12px; font-weight: bold; --border-radius: 8px; }
        .audio-preview-container { margin-top: 15px; text-align: center; }
        audio { width: 100%; max-width: 300px; }
    </style>
</head>
<body>
    <ion-app>
        <!-- CABECERA DE IONIC CORREGIDA -->
        <ion-header>
            <ion-toolbar color="primary">
                <ion-title>INFOTEC-SERVIDEERE</ion-title>
            </ion-toolbar>
        </ion-header>

        <ion-content class="ion-padding">
            <div class="logo-box">
                <img src="servi icon.jpg" alt="Logo INFOTEC-SERVIDEERE">
                <h2 class="app-title">REGISTRO TÉCNICO</h2>
            </div>

            <ion-list>
                <ion-item>
                    <ion-label position="stacked">Nombre del Cliente</ion-label>
                    <ion-input id="nombre" placeholder="Nombre completo"></ion-input>
                </ion-item>
                
                <ion-item>
                    <ion-label position="stacked">Celular del Cliente (WhatsApp)</ion-label>
                    <ion-input id="telCliente" type="tel" placeholder="Ej: 3151234567"></ion-input>
                </ion-item>

                <ion-item>
                    <ion-label position="stacked">Serie de la Máquina</ion-label>
                    <ion-input id="serie" placeholder="Ej: JD-2026X"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label position="stacked">Observaciones Diagnóstico</ion-label>
                    <ion-textarea id="obs" rows="3" placeholder="Detalles del servicio..."></ion-textarea>
                </ion-item>
            </ion-list>

            <div class="ion-padding">
                <!-- BOTÓN FOTO -->
                <ion-button expand="block" color="secondary" onclick="document.getElementById('fotoInput').click()" style="color: black;">
                    <ion-icon name="camera" slot="start"></ion-icon> CAPTURAR FOTO
                </ion-button>
                <input type="file" id="fotoInput" accept="image/*" capture="camera" style="display: none;">

                <!-- BOTÓN AUDIO -->
                <ion-button id="btnAudio" expand="block" color="warning" onclick="toggleGrabacionAudio()" style="color: black;">
                    <ion-icon id="iconAudio" name="mic" slot="start"></ion-icon> <span id="textAudio">GRABAR AUDIO</span>
                </ion-button>

                <!-- REPRODUCTOR DE AUDIO -->
                <div class="audio-preview-container">
                    <audio id="audioPlayback" controls style="display: none;"></audio>
                </div>

                <!-- BOTÓN ENVÍO -->
                <ion-button expand="block" color="success" onclick="enviarReporte()">
                    <ion-icon name="paper-plane" slot="start"></ion-icon> ENVIAR REPORTE
                </ion-button>
            </div>
        </ion-content>
    </ion-app>

    <script>
        // --- LOGICA DE AUDIO ---
        let mediaRecorder;
        let audioChunks = [];
        let estadoGrabando = false;

        async function toggleGrabacionAudio() {
            const btn = document.getElementById('btnAudio');
            const texto = document.getElementById('textAudio');
            const icono = document.getElementById('iconAudio');
            const reproductor = document.getElementById('audioPlayback');

            if (!estadoGrabando) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        reproductor.src = audioUrl;
                        reproductor.style.display = 'inline-block';
                    };

                    mediaRecorder.start();
                    estadoGrabando = true;

                    btn.setAttribute('color', 'danger');
                    texto.innerText = "DETENER GRABACIÓN";
                    icono.setAttribute('name', 'square');
                } catch (err) {
                    console.error("Error al acceder al micrófono: ", err);
                    alert("No se pudo acceder al micrófono. Verifica los permisos de tu navegador.");
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                estadoGrabando = false;

                btn.setAttribute('color', 'warning');
                texto.innerText = "GRABAR AUDIO";
                icono.setAttribute('name', 'mic');
            }
        }

        // --- LÓGICA DE ENVÍO TRIPLE ---
        function enviarReporte() {
            const n = document.getElementById('nombre').value || "Pendiente";
            const s = document.getElementById('serie').value || "Sin Serie";
            const o = document.getElementById('obs').value || "Sin observaciones";
            let telC = document.getElementById('telCliente').value.trim();
            
            const miNumero = "573176677848"; 
            const miCorreo = "servideere@gmail.com";
            
            const mensajeWhatsApp = `*INFOTEC-SERVIDEERE*%0A*Cliente:* ${n}%0A*Serie:* ${s}%0A*Diagnóstico:* ${o}`;
            const asuntoCorreo = `Reporte Técnico - Serie: ${s}`;
            const cuerpoCorreo = `INFOTEC-SERVIDEERE%0D%0A----------------------%0D%0ACliente: ${n}%0D%0ASerie de la Máquina: ${s}%0D%0AObservaciones Diagnóstico:%0D%0A${o}`;
            
            window.open(`https://wa.me/${miNumero}?text=${mensajeWhatsApp}`, '_blank');
            
            if (telC !== "") {
                if (!telC.startsWith('57') && telC.length === 10) {
                    telC = '57' + telC;
                }
                
                setTimeout(() => {
                    const confirmarWhatsAppCliente = confirm(`¿Deseas enviar este mismo reporte al WhatsApp del cliente (${telC})?`);
                    if (confirmarWhatsAppCliente) {
                        window.open(`https://wa.me/${telC}?text=${mensajeWhatsApp}`, '_blank');
                    }
                    solicitarEnvioCorreo(miCorreo, asuntoCorreo, cuerpoCorreo);
                }, 2500);
            } else {
                setTimeout(() => {
                    solicitarEnvioCorreo(miCorreo, asuntoCorreo, cuerpoCorreo);
                }, 2500);
            }
        }

        function solicitarEnvioCorreo(correo, asunto, cuerpo) {
            const confirmarCorreo = confirm(`¿Deseas respaldar este reporte enviándolo al correo ${correo}?`);
            if (confirmarCorreo) {
                window.open(`mailto:${correo}?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`, '_self');
            }
        }
    </script>
</body>
</html>
