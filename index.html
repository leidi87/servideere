<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFOTEC-SERVIDEERE</title>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <style>
        :root { --ion-color-primary: #367c2b; --ion-color-secondary: #ffde00; }
        .logo-box { text-align: center; padding: 20px; background: #f4f4f4; }
        .logo-box img { max-width: 180px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .app-title { font-weight: bold; text-align: center; color: #367c2b; margin-top: 10px; }
        ion-button { margin-top: 12px; font-weight: bold; --border-radius: 8px; }
        .audio-preview-container { margin-top: 15px; text-align: center; }
        audio { width: 100%; max-width: 300px; }
    </style>
</head>
<body>
    <ion-app>
        <ion-header>
            <ion-toolbar color="primary">
                <ion-title>INFOTEC-SERVIDEERE</title>
            </ion-toolbar>
        </header>

        <ion-content class="ion-padding">
            <div class="logo-box">
                <img src="servi icon.jpg" alt="Logo INFOTEC-SERVIDEERE">
                <h2 class="app-title">REGISTRO TÉCNICO</h2>
            </div>

            <ion-list>
                <ion-item>
                    <ion-label position="stacked">Nombre del Cliente</ion-label>
                    <ion-input id="nombre" placeholder="Nombre completo"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label position="stacked">Celular del Cliente (WhatsApp)</ion-label>
                    <ion-input id="telCliente" type="tel" placeholder="Ej: 3151234567"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label position="stacked">Serie de la Máquina</ion-label>
                    <ion-input id="serie" placeholder="Ej: JD-2026X"></ion-input>
                </ion-item>
                <ion-item>
                    <ion-label position="stacked">Observaciones Diagnóstico</ion-label>
                    <ion-textarea id="obs" rows="3" placeholder="Detalles del servicio..."></ion-textarea>
                </ion-item>
            </ion-list>

            <div class="ion-padding">
                <ion-button expand="block" color="secondary" onclick="document.getElementById('fotoInput').click()" style="color: black;">
                    <ion-icon name="camera" slot="start"></ion-icon> SELECCIONAR / TOMAR FOTO
                </ion-button>
                <input type="file" id="fotoInput" accept="image/*">

                <ion-button id="btnAudio" expand="block" color="warning" onclick="toggleGrabacionAudio()" style="color: black;">
                    <ion-icon id="iconAudio" name="mic" slot="start"></ion-icon> <span id="textAudio">GRABAR AUDIO EN VIVO</span>
                </ion-button>

                <div class="audio-preview-container">
                    <audio id="audioPlayback" controls style="display: none;"></audio>
                </div>

                <ion-button expand="block" color="success" onclick="enviarReporteAutomatico()">
                    <ion-icon name="paper-plane" slot="start"></ion-icon> ENVIAR AUTOMÁTICAMENTE
                </ion-button>
            </div>
        </ion-content>
    </ion-app>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let estadoGrabando = false;
        let audioBlobFinal = null; // Guardará el binario del audio grabado

        async function toggleGrabacionAudio() {
            const btn = document.getElementById('btnAudio');
            const texto = document.getElementById('textAudio');
            const icono = document.getElementById('iconAudio');
            const reproductor = document.getElementById('audioPlayback');

            if (!estadoGrabando) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = event => { audioChunks.push(event.data); };
                    mediaRecorder.onstop = () => {
                        audioBlobFinal = new Blob(audioChunks, { type: 'audio/mp3' });
                        reproductor.src = URL.createObjectURL(audioBlobFinal);
                        reproductor.style.display = 'inline-block';
                    };

                    mediaRecorder.start();
                    estadoGrabando = true;
                    btn.setAttribute('color', 'danger');
                    texto.innerText = "DETENER GRABACIÓN";
                    icono.setAttribute('name', 'square');
                } catch (err) {
                    alert("Verifica los permisos del micrófono.");
                }
            } else {
                mediaRecorder.stop();
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
                estadoGrabando = false;
                btn.setAttribute('color', 'warning');
                texto.innerText = "GRABAR AUDIO EN VIVO";
                icono.setAttribute('name', 'mic');
            }
        }

        // --- FUNCIÓN ASÍNCRONA DE ENVÍO DIRECTO AL BACKEND ---
        async function enviarReporteAutomatico() {
            const nombre = document.getElementById('nombre').value;
            const serie = document.getElementById('serie').value;
            const obs = document.getElementById('obs').value;
            const telCliente = document.getElementById('telCliente').value;
            const fotoInput = document.getElementById('fotoInput');

            // Creamos un contenedor de formulario Multipart (necesario para transportar archivos binarizados)
            const formData = new FormData();
            formData.append('cliente', nombre);
            formData.append('serie', serie);
            formData.append('observaciones', obs);
            formData.append('telefonoCliente', telCliente);

            // Adjuntar foto si fue seleccionada
            if (fotoInput.files[0]) {
                formData.append('foto', fotoInput.files[0]);
            }

            // Adjuntar audio si fue grabado
            if (audioBlobFinal) {
                formData.append('audio', audioBlobFinal, 'nota-de-voz.mp3');
            }

            alert("Iniciando envío automático en segundo plano...");

            try {
                // LLamado HTTP Post hacia la API local de Node.js
                const response = await fetch('http://localhost:3000/api/enviar-reporte', {
                    method: 'POST',
                    body: formData
                });

                const resultado = await response.json();
                if (resultado.success) {
                    alert("¡Éxito! El reporte, la foto y el audio se enviaron directamente a los chats de WhatsApp de manera transparente.");
                } else {
                    alert("Error en el servidor: " + resultado.error);
                }
            } catch (error) {
                console.error(error);
                alert("No se pudo conectar con el servidor API local. Asegúrate de ejecutar 'node server.js' en la terminal.");
            }
        }
    </script>
</body>
</html>
