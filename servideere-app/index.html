<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servi Deere - Reporte de Servicio</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- Cargamos EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

    <main class="service-app">
        <header class="service-app__header">
            <h1 class="service-app__title">Servi Deere</h1>
            <p class="service-app__subtitle">Registro de Control Técnico</p>
        </header>

        <form id="form-servicio" class="service-form">
            
            <!-- Datos del Cliente -->
            <fieldset class="service-form__section">
                <legend class="service-form__legend">Datos del Cliente y Servicio</legend>
                
                <div class="service-form__group">
                    <label class="service-form__label" for="nombre">Nombre del Cliente:</label>
                    <input class="service-form__input" type="text" id="nombre" required placeholder="Ej. Juan Pérez">
                </div>

                <div class="service-form__group">
                    <label class="service-form__label" for="telefono">Teléfono:</label>
                    <input class="service-form__input" type="tel" id="telefono" required placeholder="Ej. 3101234567">
                </div>

                <div class="service-form__group">
                    <label class="service-form__label" for="fecha">Fecha del Servicio:</label>
                    <input class="service-form__input" type="date" id="fecha" required>
                </div>
            </fieldset>

            <!-- Datos de la Máquina -->
            <fieldset class="service-form__section">
                <legend class="service-form__legend">Información de la Maquinaria</legend>

                <div class="service-form__group">
                    <label class="service-form__label" for="serie">Número de Serie:</label>
                    <input class="service-form__input" type="text" id="serie" required placeholder="Ej. JDX12345678">
                </div>

                <div class="service-form__group">
                    <label class="service-form__label" for="observaciones">Observaciones Técnicas:</label>
                    <textarea class="service-form__textarea" id="observaciones" rows="4" required placeholder="Describe el estado o reparación..."></textarea>
                </div>
            </fieldset>

            <!-- Multimedia -->
            <fieldset class="service-form__section">
                <legend class="service-form__legend">Evidencias (Multimedia)</legend>

                <!-- Fotos -->
                <div class="service-form__group">
                    <label class="service-form__label" for="foto">Capturar/Adjuntar Foto:</label>
                    <input class="service-form__input" type="file" id="foto" accept="image/*" capture="environment">
                    <div id="preview-foto" class="service-form__preview"></div>
                </div>

                <!-- Audio -->
                <div class="service-form__group">
                    <label class="service-form__label">Notas de Voz:</label>
                    <div class="audio-control">
                        <button type="button" id="btn-record" class="audio-control__button audio-control__button--record">Grabar Audio</button>
                        <button type="button" id="btn-stop" class="audio-control__button audio-control__button--stop" disabled>Detener</button>
                    </div>
                    <div id="preview-audio" class="service-form__preview"></div>
                </div>
            </fieldset>

            <!-- Acciones -->
            <div class="service-form__actions">
                <button type="submit" name="destino" value="email" class="service-form__btn service-form__btn--email">Guardar y Enviar por Correo</button>
                <button type="submit" name="destino" value="whatsapp" class="service-form__btn service-form__btn--whatsapp">Enviar Notificación por WhatsApp</button>
            </div>

        </form>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
